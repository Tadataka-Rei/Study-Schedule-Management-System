<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký - SSMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="center-page">
<header>
  <div class="header-inner">
    <div class="logo">SSMS</div>
  </div>
</header>

<div class="auth-box">
  <h2>Đăng ký</h2>
  <input type="text" id="regUser" placeholder="Tên tài khoản">
  <input type="password" id="regPass" placeholder="Mật khẩu">
  <div style="margin-top:12px">
    <button onclick="register()">Đăng ký</button>
    <button onclick="window.location='login.html'" class="btn secondary">Đăng nhập</button>
  </div>
</div>

<script>
function register(){
  var u = document.getElementById("regUser").value.trim();
  var p = document.getElementById("regPass").value;
  if(!u || !p){ alert("Nhập tên và mật khẩu"); return; }
  var acc = JSON.parse(localStorage.getItem("accounts")||"{}");
  if(acc[u]){ alert("Tài khoản đã tồn tại"); return; }
  acc[u] = p;
  localStorage.setItem("accounts", JSON.stringify(acc));
  alert("Đăng ký thành công. Vui lòng đăng nhập.");
  window.location = "login.html";
}
</script>
</body>
</html>
