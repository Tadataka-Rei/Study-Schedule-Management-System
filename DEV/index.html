<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SSMS - Hệ thống quản lý lịch học tập</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">SSMS</div>
      <nav>
        <a class="active">Trang chủ</a>
        <a>Ghi chú</a>
        <a>Quản lý môn học</a>
        <a>Tra cứu môn học</a>
      </nav>
      <a href="login.html" class="logo-link" style="margin-left:auto;">
        <img src="logo.svg" alt="User" style="width:46px;height:46px;border-radius:50%;border:2px solid #fff">
      </a>
    </div>
  </header>

  <main>
    <h1>Thời khóa biểu tuần</h1>

    <section class="timetable-card">
      <div class="controls">
        <div class="control-group">
          <label for="weekSelect">Chọn tuần:</label>
          <select id="weekSelect">
            <option value="2025-W46">Tuần 46 - 17/11/2025</option>
            <option value="2025-W48">Tuần 48 - 01/12/2025</option>
            <option value="2025-W50">Tuần 50 - 15/12/2025</option>
            <option value="2025-W52">Tuần 52 - 29/12/2025</option>
          </select>
        </div>

        <div class="control-group">
          <label>Thêm môn nhanh:</label>
          <input id="courseName" placeholder="Tên môn" aria-label="Tên môn" />
          <select id="courseDay" aria-label="Ngày">
            <option value="0">Thứ 2</option>
            <option value="1">Thứ 3</option>
            <option value="2">Thứ 4</option>
            <option value="3">Thứ 5</option>
            <option value="4">Thứ 6</option>
            <option value="5">Thứ 7</option>
            <option value="6">Chủ nhật</option>
          </select>
          <select id="courseSlot" aria-label="Ca">
            <option value="0">Sáng 1</option>
            <option value="1">Sáng 2</option>
            <option value="2">Chiều 1</option>
            <option value="3">Chiều 2</option>
            <option value="4">Tối 1</option>
            <option value="5">Tối 2</option>
          </select>
          <button class="btn" id="addCourseBtn">Thêm vào lịch</button>
        </div>

        <div class="control-group actions">
          <button class="btn secondary" id="clearBtn">Xóa tuần hiện tại</button>
          <button class="btn" id="exportBtn">Xuất JSON</button>
        </div>
      </div>

      <div class="timetable-area" aria-label="Lịch tuần">
        <div class="time-col" aria-hidden="true">
          <div class="time-slot">08:00</div>
          <div class="time-slot">09:30</div>
          <div class="time-slot">13:00</div>
          <div class="time-slot">14:30</div>
          <div class="time-slot">18:00</div>
          <div class="time-slot">19:30</div>
        </div>

        <div class="grid">
          <div class="grid-inner" id="grid" role="grid" aria-label="Bảng thời khóa biểu">
            <!-- cells generated by JS -->
          </div>
        </div>
      </div>

      <div class="featured" aria-live="polite">
        <h3>Các môn học nổi bật</h3>
        <div class="courses" id="featuredList"></div>
      </div>
    </section>

  </main>

  <footer>
    <div class="small">SSMS — Hệ thống quản lý lịch học tập (ví dụ giao diện). Lưu dữ liệu tạm thời trên LocalStorage.</div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
